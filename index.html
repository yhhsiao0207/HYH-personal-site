<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Yu-Hsuan | Personal Website</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }

        header {
            padding: 60px 20px;
            text-align: center;
            background: linear-gradient(135deg, #1e293b, #0f172a);
        }

        h1 {
            margin: 0;
            font-size: 40px;
        }

        h2 {
            border-bottom: 2px solid #334155;
            padding-bottom: 10px;
            margin-top: 50px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 40px 20px;
        }

        .about {
            font-size: 18px;
            line-height: 1.8;
            color: #cbd5e1;
        }

        .skills {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .skill-box {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
        }

        .progress {
            background: #334155;
            border-radius: 20px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-bar {
            height: 10px;
            background: #38bdf8;
        }

        .contact {
            text-align: center;
            margin-top: 60px;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #38bdf8;
            color: #0f172a;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #0ea5e9;
        }

        footer {
            text-align: center;
            padding: 30px;
            background: #0f172a;
            color: #64748b;
            font-size: 14px;
        }
    </style>
</head>
<body>

<header>
    <h1>Yu-Hsuan</h1>
    <p>Quality System Reviewer | Future Tech Professional</p>
</header>

<div class="container">

    <section>
        <h2>About Me</h2>
        <p class="about">
            我目前任職於醫療器材品質管理系統審查領域，<br>
            專注於法規合規、風險管理與品質改善。<br><br>
            正在積極轉向科技產業，學習程式設計與數據能力，
            目標是成為具備技術與產業理解的跨領域人才。
        </p>
    </section>

    <section>
        <h2>Skills</h2>
        <div class="skills">
            <div class="skill-box">
                Python
                <div class="progress">
                    <div class="progress-bar" style="width:60%"></div>
                </div>
            </div>

            <div class="skill-box">
                Data Analysis
                <div class="progress">
                    <div class="progress-bar" style="width:50%"></div>
                </div>
            </div>

            <div class="skill-box">
                Quality Management
                <div class="progress">
                    <div class="progress-bar" style="width:90%"></div>
                </div>
            </div>

            <div class="skill-box">
                Regulatory Knowledge
                <div class="progress">
                    <div class="progress-bar" style="width:85%"></div>
                </div>
            </div>
        </div>
    </section>

    <section class="contact">
        <h2>Contact</h2>
        <a href="mailto:yourmail@example.com" class="btn">Email Me</a>
    </section>

</div>

<footer>
    © 2026 Yu-Hsuan | Personal Website
</footer>

</body>
</html>
