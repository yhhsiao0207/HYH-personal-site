<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的個人首頁</title>
    <style>
        /* 這裡負責網頁的「化妝」 */
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 350px;
            width: 90%;
        }
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #ddd;
            margin-bottom: 1rem;
            object-fit: cover;
        }
        h1 { margin: 0.5rem 0; color: #333; }
        p { color: #666; line-height: 1.6; }
        .links a {
            display: inline-block;
            margin: 10px;
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
        }
        .links a:hover { color: #0056b3; }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://via.placeholder.com/150" alt="我的照片" class="profile-img">
        
        <h1>你好，我是 [你的名字] 👋</h1>
        <p>這是我的人生格言：<b>「保持好奇，持續學習。」</b></p>
        
        <hr>
        
        <p>目前我是一位對網頁製作感興趣的新手，正在探索程式碼的奧妙！</p>

        <div class="links">
            <a href="#">我的作品</a>
            <a href="#">Instagram</a>
            <a href="mailto:hello@example.com">聯絡我</a>
        </div>
    </div>

</body>
</html>
